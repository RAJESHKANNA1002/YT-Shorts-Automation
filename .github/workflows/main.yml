name: RK TechFlow Daily Automation

on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 9:00 AM IST
  workflow_dispatch:      # Allows manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This line forces GitHub to use the latest Node.js engine and removes the warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai gtts moviepy requests python-dotenv google-auth-oauthlib google-api-python-client

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Create Secrets Files
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRET_JSON }}" > client_secret.json
          echo "${{ secrets.TOKEN_JSON }}" > token.json

      - name: Run Automation
        run: python app.py