name: RK TechFlow Daily Automation

on:
  schedule:
    # Changed to 9:17 AM IST (03:47 UTC) to avoid peak API traffic spikes
    - cron: '47 3 * * *'  
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added 'groq' to the list below
          pip install groq gtts moviepy requests python-dotenv google-auth-oauthlib google-api-python-client

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Create Secrets Files
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRET_JSON }}" > client_secret.json
          echo "${{ secrets.TOKEN_JSON }}" > token.json

      - name: Run Automation
        run: python app.py
