name: RK TechFlow Daily Automation

on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai gtts moviepy requests python-dotenv google-auth-oauthlib google-api-python-client

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Create Secrets Files
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRET_JSON }}" > client_secret.json
          echo "${{ secrets.TOKEN_JSON }}" > token.json

      - name: Run Automation
        run: python app.py